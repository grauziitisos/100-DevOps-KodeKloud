---
- name: Setup Apache on App Server 3
  hosts: stapp03
  become: yes

  vars:
    # Requirement (b) specifies port 8083
    apache_port: 8083
    # Requirement (c) specifies official and demo websites
    websites:
      - { name: "official", src: "/home/thor/official" }
      - { name: "demo", src: "/home/thor/demo" }

  tasks:
    # Requirement (a): Install httpd package and dependencies
    - name: Install httpd package
      yum:
        name: httpd
        state: present

    # Requirement (b): Configure Apache to listen on port 8083
    - name: Change Apache to listen on port {{ apache_port }}
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^Listen '
        line: "Listen {{ apache_port }}"
        state: present

    # Requirement (c): Copy website files from jump host to app server
    - name: Deploy website content
      copy:
        src: "{{ item.src }}"
        dest: /var/www/html/
        directory_mode: '0755'
      loop: "{{ websites }}"

    # Requirement (d): Ensure Apache is started and enabled so curl works
    - name: Ensure Apache is started and enabled
      service:
        name: httpd
        state: started
        enabled: yes
