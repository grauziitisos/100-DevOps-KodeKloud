---
- name: Setup Apache and PHP on App Servers
  hosts: stapp01, stapp02, stapp03
  become: yes

  vars:
    # Requirement (b) specifies port 6200
    apache_port: 6200
    websites:
      - { name: "beta", src: "/home/thor/beta" }
      - { name: "apps", src: "/home/thor/apps" }

  tasks:
    # Requirement (a): Install httpd, php and its dependencies
    - name: Install httpd, php and dependencies
      yum:
        name:
          - httpd
          - php
          - php-mysqlnd
        state: present

    - name: Change Apache to listen on custom port {{ apache_port }}
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^Listen '
        line: "Listen {{ apache_port }}"
        state: present

    - name: Create website directories under /var/www/html
      file:
        path: "/var/www/html/{{ item.name }}"
        state: directory
        owner: apache
        group: apache
        mode: '0755'
      loop: "{{ websites }}"

    - name: Copy website files from jump host to app server
      copy:
        src: "{{ item.src }}/"
        dest: "/var/www/html/{{ item.name }}/"
        owner: apache
        group: apache
        mode: '0644'
      loop: "{{ websites }}"

    - name: Ensure Apache is started and enabled
      service:
        name: httpd
        state: started
        enabled: yes

# NEW PLAY FOR DATABASE
- name: Setup MariaDB on DB Server
  hosts: stdb01
  become: yes

  vars:
    db_name: kodekloud_db10
    db_user: kodekloud_cap
    db_pass: LQfKeWWxWD

  tasks:
    # Requirement (c): Install/Configure MariaDB server
    - name: Install MariaDB server and Python MySQL library
      yum:
        name:
          - mariadb-server
          - python3-PyMySQL # Required for Ansible mysql modules
        state: present

    - name: Start and enable MariaDB service
      service:
        name: mariadb
        state: started
        enabled: yes

    # Requirement (d): Create database and user with permissions
    - name: Create the database
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock

    - name: Create database user and grant permissions
      mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_pass }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock
