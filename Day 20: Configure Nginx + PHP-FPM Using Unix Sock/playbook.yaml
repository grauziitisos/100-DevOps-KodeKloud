---
- name: Configure App Server 2 with Nginx + PHP 8.3
  hosts: stapp02
  become: yes
  tasks:

    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Ensure Nginx is enabled and running
      systemd:
        name: nginx
        enabled: yes
        state: started

    - name: Create Nginx site config for port 8095
      copy:
        dest: /etc/nginx/conf.d/custom-site.conf
        content: |
          server {
              listen 8095;
              server_name _;
              root /var/www/html;

              index index.php index.html;
              location / {
                  try_files $uri $uri/ =404;
              }

              location ~ \.php$ {
                  include fastcgi_params;
                  fastcgi_pass unix:/var/run/php-fpm/default.sock;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              }
          }
      notify: Reload Nginx

    - name: Install EPEL release (for Remi)
      dnf:
        name: epel-release
        state: present

    - name: Install Remi repo (safe, version-agnostic)
      ansible.builtin.shell: |
        dnf install -y https://rpms.remirepo.net/enterprise/remi-release-8.rpm || true
      args:
        creates: /etc/yum.repos.d/remi.repo

    - name: Enable Remi PHP 8.3 module
      command: dnf module enable -y php:remi-8.3
      args:
        creates: /etc/dnf/modules.d/php.module

    - name: Install PHP 8.3 FPM
      dnf:
        name:
          - php-fpm
          - php-cli
          - php-mbstring
          - php-opcache
        state: present

    - name: Ensure PHP-FPM directories exist
      file:
        path: /var/run/php-fpm
        state: directory
        owner: apache
        group: apache
        mode: 0755

    - name: Configure PHP-FPM socket
      lineinfile:
        path: /etc/php-fpm.d/www.conf
        regexp: '^listen ='
        line: 'listen = /var/run/php-fpm/default.sock'
      notify: Restart PHP-FPM

    - name: Ensure PHP-FPM is enabled and running
      systemd:
        name: php-fpm
        enabled: yes
        state: started

  handlers:
    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Restart PHP-FPM
      systemd:
        name: php-fpm
        state: restarted
