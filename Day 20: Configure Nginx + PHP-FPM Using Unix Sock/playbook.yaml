---
- name: Configure App Server 2
  hosts: stapp02
  become: true
  vars:
    nginx_port: 8095
    document_root: /var/www/html
    php_socket: /var/run/php-fpm/default.sock

  tasks:

  - name: Install Nginx
    ansible.builtin.yum:
      name: nginx
      state: present

  - name: Ensure Nginx service is enabled and started
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: true

  - name: Create document root
    ansible.builtin.file:
      path: "{{ document_root }}"
      state: directory
      owner: nginx
      group: nginx
      mode: '0755'

  - name: Configure Nginx site for port 8095
    ansible.builtin.copy:
      dest: /etc/nginx/conf.d/custom_site.conf
      content: |
        server {
            listen {{ nginx_port }};
            server_name localhost;

            root {{ document_root }};
            index index.php index.html index.htm;

            location ~ \.php$ {
                include fastcgi_params;
                fastcgi_pass unix:{{ php_socket }};
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            }
        }

  - name: Reload Nginx to apply configuration
    ansible.builtin.service:
      name: nginx
      state: reloaded

  - name: Install PHP-FPM 8.3
    ansible.builtin.yum:
      name: php-fpm
      state: present

  - name: Ensure PHP-FPM service is enabled and started
    ansible.builtin.service:
      name: php-fpm
      state: started
      enabled: true

  - name: Create PHP-FPM socket directory
    ansible.builtin.file:
      path: "{{ php_socket | dirname }}"
      state: directory
      owner: nginx
      group: nginx
      mode: '0755'

  - name: Configure PHP-FPM to use custom socket
    ansible.builtin.lineinfile:
      path: /etc/php-fpm.d/www.conf
      regexp: '^listen ='
      line: "listen = {{ php_socket }}"
      backrefs: yes

  - name: Reload PHP-FPM
    ansible.builtin.service:
      name: php-fpm
      state: restarted
